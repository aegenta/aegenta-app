<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AEGENTA — The Agent That Already Knows Your Life</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin:0; background:#000; color:white; font-family:system-ui; overflow:hidden; }
    .hero { 
      height:100vh; 
      background: linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.85)), 
                  url('/hero.jpg') center/cover no-repeat; 
      display:flex; align-items:center; justify-content:center; text-align:center; position:relative; 
    }
    .A { 
      font-size:clamp(180px,35vw,420px); 
      font-weight:900; line-height:0.8; 
      background:linear-gradient(135deg,#00f0ff,#a020f0,#ff00aa); 
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; 
      filter:drop-shadow(0 0 80px #00f0ff) drop-shadow(0 0 140px #a020f0) drop-shadow(0 0 200px #ff00aa); 
      transition:all 0.25s cubic-bezier(0.4,0,0.2,1); 
      cursor:pointer;
    }
    .A:active { 
      transform:scale(0.88) translateY(18px); 
      filter:drop-shadow(0 40px 80px rgba(0,0,0,0.95)) brightness(1.3); 
    }
    .btn { 
      margin-top:2rem; padding:1.8rem 5rem; font-size:2.2rem; font-weight:bold; 
      background:linear-gradient(135deg,#00f0ff,#a020f0); border:none; 
      border-radius:9999px; color:#000; box-shadow:0 0 60px rgba(0,240,255,0.7); 
      transition:all 0.3s; 
    }
    .btn:active { transform:scale(0.95); }
  </style>
</head>
<body>
  <div class="hero">
    <div class="relative z-10">
      <div class="A" onclick="document.getElementById('waitlist').style.display='flex'">A</div>
      <h1 class="text-7xl md:text-9xl font-black mt-6 tracking-tighter">AEGENTA</h1>
      <p class="text-3xl md:text-5xl mt-6 max-w-2xl mx-auto">The Agent That Already Knows Your Life</p>
      <button onclick="document.getElementById('waitlist').style.display='flex'" class="btn mt-10">Join Salt Lake City Beta — First 500 Spots</button>
      <p class="mt-12 text-lg opacity-70">47,892 already joined • aegenta.app • West Jordan, UT</p>
    </div>
  </div>

  <div id="waitlist" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-zinc-900 p-10 rounded-3xl text-center max-w-md">
      <h2 class="text-4xl font-bold">Welcome, William!</h2>
      <p class="my-6">You’re #1 in the SLC / West Jordan beta.<br>Invite link coming in 24h.</p>
      <button onclick="alert('✅ AEGENTA is LIVE on aegenta.app! Share it everywhere! 🚀')" class="bg-white text-black px-12 py-6 rounded-2xl text-2xl font-bold">Claim My Spot</button>
    </div>
  </div>
</body>
</html>
