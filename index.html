<script>
  let history = [];
  function openAgentChat() {
    document.getElementById('agentChat').classList.remove('hidden');
    const chat = document.getElementById('chatMessages');
    chat.innerHTML = `<div class="bg-zinc-800 rounded-2xl p-4 max-w-[80%]">Hello William. I'm your AEGENTA Agent. I already know you're in West Jordan. What should I handle for you today?</div>`;
    history = [];
  }
  function closeAgentChat() {
    document.getElementById('agentChat').classList.add('hidden');
  }
  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const userMsg = input.value.trim();
    if (!userMsg) return;
    const chat = document.getElementById('chatMessages');
    chat.innerHTML += `<div class="bg-cyan-600 ml-auto rounded-2xl p-4 max-w-[80%]">${userMsg}</div>`;
    history.push({role: "user", content: userMsg});
    input.value = '';
    chat.scrollTop = chat.scrollHeight;

    const thinking = document.createElement('div');
    thinking.className = "bg-zinc-800 rounded-2xl p-4 max-w-[80%]";
    thinking.textContent = "Thinking...";
    chat.appendChild(thinking);
    chat.scrollTop = chat.scrollHeight;

    // This now reads the secure key from Vercel env variable
    const apiKey = import.meta.env.VITE_XAI_API_KEY;

    if (!apiKey) {
      thinking.textContent = "Error: API key not configured. Check Vercel environment variables.";
      return;
    }

    const response = await fetch("https://api.x.ai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: "grok-beta",
        messages: [
          {role: "system", content: "You are AEGENTA, a proactive on-device AI Life OS. You are warm, helpful, funny, and extremely capable. You know the user is William in West Jordan, UT. Always be proactive and suggest helpful actions."},
          ...history
        ],
        temperature: 0.7,
        max_tokens: 300
      })
    });

    const data = await response.json();
    const reply = data.choices[0].message.content;

    thinking.remove();
    chat.innerHTML += `<div class="bg-zinc-800 rounded-2xl p-4 max-w-[80%]">${reply}</div>`;
    history.push({role: "assistant", content: reply});
    chat.scrollTop = chat.scrollHeight;
  }

  function showWaitlist() {
    document.getElementById('waitlistModal').classList.remove('hidden');
  }
  function claimSpot() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) return alert("Please enter your email");
    document.getElementById('successMessage').classList.remove('hidden');
    let count = parseInt(document.getElementById('joinedCount').textContent.split(',')[0].replace(/[^0-9]/g,'')) + 1;
    document.getElementById('joinedCount').innerHTML = `${count.toLocaleString()} already joined • aegenta.app • West Jordan, UT`;
  }
</script>
