<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AEGENTA — The Agent That Already Knows Your Life</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin:0; background:#000; color:white; font-family:system-ui; overflow:hidden; }
    .hero { 
      height:100vh; 
      background: linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.85)), 
                  url('image.jpg') center/cover no-repeat; 
      display:flex; align-items:center; justify-content:center; text-align:center; position:relative; 
    }
    .A { 
      font-size:clamp(180px,35vw,420px); 
      font-weight:900; line-height:0.8; 
      background:linear-gradient(135deg,#00f0ff,#a020f0,#ff00aa); 
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; 
      filter:drop-shadow(0 0 80px #00f0ff) drop-shadow(0 0 140px #a020f0) drop-shadow(0 0 200px #ff00aa); 
      transition:all 0.25s cubic-bezier(0.4,0,0.2,1); 
      cursor:pointer;
    }
    .A:active { 
      transform:scale(0.88) translateY(18px); 
      filter:drop-shadow(0 40px 80px rgba(0,0,0,0.95)) brightness(1.3); 
    }
    .btn { 
      margin-top:2rem; padding:1.8rem 5rem; font-size:2.2rem; font-weight:bold; 
      background:linear-gradient(135deg,#00f0ff,#a020f0); border:none; 
      border-radius:9999px; color:#000; box-shadow:0 0 60px rgba(0,240,255,0.7); 
      transition:all 0.3s; 
    }
    .btn:active { transform:scale(0.95); }
  </style>
</head>
<body>
  <div class="hero">
    <div class="relative z-10">
      <div class="A" onclick="openAgentChat()">A</div>
      <h1 class="text-7xl md:text-9xl font-black mt-6 tracking-tighter">AEGENTA</h1>
      <p class="text-3xl md:text-5xl mt-6 max-w-2xl mx-auto">The Agent That Already Knows Your Life</p>
      <button onclick="openAgentChat()" class="btn mt-10">Join Salt Lake City Beta — First 500 Spots</button>
      <p class="mt-12 text-lg opacity-70">47,892 already joined • aegenta.app • West Jordan, UT</p>
    </div>
  </div>

  <!-- Agent Chat Modal -->
  <div id="agentChat" class="hidden fixed inset-0 bg-black/95 flex items-end z-50">
    <div class="bg-zinc-900 w-full max-w-md mx-auto rounded-t-3xl overflow-hidden">
      <div class="p-4 border-b border-zinc-700 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-full flex items-center justify-center text-xl">A</div>
          <div>
            <div class="font-bold">AEGENTA Agent</div>
            <div class="text-xs text-green-400">● Always on • On-device • Grok-powered</div>
          </div>
        </div>
        <button onclick="closeAgentChat()" class="text-3xl text-zinc-400">×</button>
      </div>
      <div id="chatMessages" class="h-96 p-4 overflow-y-auto space-y-4 bg-black/40"></div>
      <div class="p-4 border-t border-zinc-700">
        <input id="chatInput" type="text" placeholder="Ask me anything..." class="w-full bg-zinc-800 text-white rounded-2xl px-5 py-4 focus:outline-none" onkeypress="if(event.key==='Enter') sendMessage()">
      </div>
    </div>
  </div>

  <script>
    let history = [];
    function openAgentChat() {
      document.getElementById('agentChat').classList.remove('hidden');
      const chat = document.getElementById('chatMessages');
      chat.innerHTML = `<div class="bg-zinc-800 rounded-2xl p-4 max-w-[80%]">Hello William. I'm your AEGENTA Agent — powered by Grok. I already know you're in West Jordan. What should I handle for you today?</div>`;
      history = [];
    }
    function closeAgentChat() {
      document.getElementById('agentChat').classList.add('hidden');
    }
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const userMsg = input.value.trim();
      if (!userMsg) return;
      const chat = document.getElementById('chatMessages');
      chat.innerHTML += `<div class="bg-cyan-600 ml-auto rounded-2xl p-4 max-w-[80%]">${userMsg}</div>`;
      history.push({role: "user", content: userMsg});
      input.value = '';
      chat.scrollTop = chat.scrollHeight;

      const thinking = document.createElement('div');
      thinking.className = "bg-zinc-800 rounded-2xl p-4 max-w-[80%]";
      thinking.textContent = "Thinking...";
      chat.appendChild(thinking);
      chat.scrollTop = chat.scrollHeight;

      // REPLACE WITH YOUR NEW API KEY HERE (after creating a new one)
      const apiKey = "xai-55JBP5JAJUsUXyvvz1ersZZv5sQo18UyyivGf4zoy1yH9DbRA66mi5xsPtDRi5Inhy3jyPmEFIS5JRsA";  // ← PASTE YOUR NEW KEY HERE

      const response = await fetch("https://api.x.ai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: "grok-beta",
          messages: [
            {role: "system", content: "You are AEGENTA, a proactive, warm, and extremely capable on-device AI Life OS. You know the user is William in West Jordan, Utah. Always be helpful, proactive, and a little fun. Use varied responses, remember context, and suggest actions."},
            ...history
          ],
          temperature: 0.8,
          max_tokens: 300
        })
      });

      if (!response.ok) {
        thinking.textContent = "Error: API issue. Check your key or rate limit.";
        return;
      }

      const data = await response.json();
      const reply = data.choices[0].message.content;

      thinking.remove();
      chat.innerHTML += `<div class="bg-zinc-800 rounded-2xl p-4 max-w-[80%]">${reply}</div>`;
      history.push({role: "assistant", content: reply});
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
